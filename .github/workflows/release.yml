name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Package app
        run: BUILD_NUMBER="$GITHUB_RUN_NUMBER" ./script/package_release.sh

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v${{ steps.version.outputs.version }}.${{ github.run_number }}
          RELEASE_TITLE: NextMeet ${{ steps.version.outputs.version }} (${{ github.run_number }})
        run: |
          cat > release-notes.md <<'NOTES'
          NextMeet ${{ steps.version.outputs.version }} build ${{ github.run_number }}

          Download NextMeet.zip, unzip it, move NextMeet.app to Applications, and open it.

          Requires macOS 14 or newer.

          Commit: ${{ github.sha }}
          NOTES

          gh release create "$RELEASE_TAG" \
            dist/NextMeet.zip \
            dist/NextMeet.zip.sha256 \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TITLE" \
            --notes-file release-notes.md
